{% extends "base.html" %}

{% block title %}TNF{% endblock %}

{% block extra_styles %}
.content {
    padding: 0;
    display: flex;
    flex-direction: column;
}

iframe {
    flex: 1;
    width: 100%;
    height: 100%;
    border: none;
}
{% endblock %}

{% block content %}
<iframe
    src="https://tnf.staging.elasticsuite.com/"
    title="TNF ElasticSuite"
    allowfullscreen
    allow="storage-access *; fullscreen *; clipboard-read *; clipboard-write *; autoplay *"
    referrerpolicy="no-referrer-when-downgrade"
    credentialless>
</iframe>
{% endblock %}
