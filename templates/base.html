<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Left sidebar */
        .sidebar {
            width: 200px;
            min-width: 200px;
            background-color: #1e1e2e;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            gap: 8px;
        }

        .sidebar a.nav-btn {
            display: block;
            margin: 0 12px;
            padding: 12px 16px;
            background-color: #2a2a3e;
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            text-align: left;
            transition: background-color 0.2s;
        }

        .sidebar a.nav-btn:hover,
        .sidebar a.nav-btn.active {
            background-color: #4a90d9;
            color: #fff;
        }

        /* Main content area */
        .content {
            flex: 1;
            overflow: auto;
            padding: 40px;
            background-color: #f5f5f5;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="/" class="nav-btn {% if request.path == '/' %}active{% endif %}">Home Page</a>
        <a href="/tnf" class="nav-btn {% if request.path == '/tnf' %}active{% endif %}">TNF</a>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
